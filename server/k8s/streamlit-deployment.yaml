---
# Streamlit Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-deployment
  namespace: default
  labels:
    app: streamlit
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
        tier: frontend
    spec:
      containers:
        - name: streamlit
          image: spark-traffic:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: spark-traffic-config
                  key: API_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10