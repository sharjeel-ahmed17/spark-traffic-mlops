---
# FastAPI Inference Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
  namespace: default
  labels:
    app: fastapi
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        tier: api
    spec:
      containers:
        - name: fastapi
          image: spark-traffic:latest
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: spark-traffic-config
                  key: MLFLOW_TRACKING_URI
            - name: PYSPARK_PYTHON
              valueFrom:
                configMapKeyRef:
                  name: spark-traffic-config
                  key: PYSPARK_PYTHON
            - name: PYSPARK_DRIVER_PYTHON
              valueFrom:
                configMapKeyRef:
                  name: spark-traffic-config
                  key: PYSPARK_DRIVER_PYTHON
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: models-volume
              mountPath: /app/models
      volumes:
        - name: models-volume
          persistentVolumeClaim:
            claimName: models-pvc