name: DVC Pipeline with DagsHub

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
      - 'dvc.lock'
      - '.github/workflows/dvc-pipeline.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
      - 'dvc.lock'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dvc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_PASSWORD: ${{ secrets.DAGSHUB_PASSWORD }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Configure DagsHub DVC Remote
        run: |
          dvc remote add -d dagshub https://dagshub.com/sharjeel-ahmed17/spark-traffic-mlops.dvc
          dvc remote modify dagshub auth basic
          dvc remote modify dagshub -u ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify dagshub -p ${{ secrets.DAGSHUB_PASSWORD }}

      - name: Configure Git for DagsHub
        run: |
          git remote set-url origin https://${{ secrets.DAGSHUB_USERNAME }}:${{ secrets.DAGSHUB_PASSWORD }}@dagshub.com/sharjeel-ahmed17/spark-traffic-mlops.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cache DVC files
        uses: actions/cache@v3
        with:
          path: |
            .dvc/cache
          key: dvc-cache-${{ hashFiles('dvc.lock') }}
          restore-keys: |
            dvc-cache-

      - name: Pull DVC data from DagsHub
        run: |
          dvc pull -r dagshub || true
        continue-on-error: true

      - name: Configure MLflow
        run: |
          echo "Configuring MLflow tracking environment"
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI"
          # If your code reads MLflow env vars, they are already available in the environment for subsequent steps.

      - name: Run DVC pipeline
        run: |
          dvc repro --force

      - name: Push DVC data to DagsHub
        if: github.event_name == 'push'
        run: |
          dvc push -r dagshub || true
        continue-on-error: true

      - name: Generate DVC plots
        if: always()
        run: |
          dvc plots diff --out plots.html || true
          mkdir -p artifacts
          mv plots.html artifacts/ || true

      - name: Collect metrics
        if: always()
        run: |
          dvc metrics show -a --json > artifacts/metrics.json || true
          cat artifacts/metrics.json

      - name: Upload DVC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-artifacts
          path: artifacts/
          retention-days: 30

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const metrics = JSON.parse(fs.readFileSync('artifacts/metrics.json', 'utf8'));
              const metricsStr = JSON.stringify(metrics, null, 2);
              
              const mlflowUri = process.env.MLFLOW_TRACKING_URI || 'not set';
              const comment = `## 🚀 DVC Pipeline Report
              
              ### 📊 Metrics
              \`\`\`json
              ${metricsStr}
              \`\`\`
              
              ### 📈 Links
              - MLflow Tracking URI: ${mlflowUri}
              - [DVC Repository](https://dagshub.com/sharjeel-ahmed17/spark-traffic-mlops)
              
              ✅ Pipeline completed successfully!`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post metrics comment:', e.message);
            }

      - name: Push updated dvc.lock to repository
        if: github.event_name == 'push' && success()
        run: |
          git add dvc.lock
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dvc.lock from pipeline run" && git push origin HEAD:${{ github.ref }})
        continue-on-error: true

  dvc-dag:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install DVC
        run: pip install dvc

      - name: Generate DVC DAG
        run: |
          mkdir -p dag_output
          dvc dag --md > dag_output/pipeline_dag.md
          cat dag_output/pipeline_dag.md

      - name: Upload DAG
        uses: actions/upload-artifact@v4
        with:
          name: dvc-dag
          path: dag_output/

      - name: Comment DAG on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const dag = fs.readFileSync('dag_output/pipeline_dag.md', 'utf8');
              const mlflowUri = process.env.MLFLOW_TRACKING_URI || 'not set';
              const comment = `## 📊 DVC Pipeline DAG
              
              \`\`\`
              ${dag}
              \`\`\`
              
              MLflow Tracking URI: ${mlflowUri}
              
              View the full pipeline on [DagsHub](https://dagshub.com/sharjeel-ahmed17/spark-traffic-mlops)`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post DAG comment:', e.message);
            }

  dvc-metrics-to-dagshub:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && success()
    needs: dvc-pipeline
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dvc-artifacts

      - name: Log metrics to console
        run: |
          echo "📊 Pipeline Metrics:"
          cat metrics.json || echo "No metrics file found"

      - name: Comment on commit with metrics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const metrics = JSON.parse(fs.readFileSync('metrics.json', 'utf8'));
              const metricsStr = JSON.stringify(metrics, null, 2);
              const mlflowUri = process.env.MLFLOW_TRACKING_URI || 'not set';
              
              const comment = `## ✅ Pipeline Executed Successfully
              
              ### 📊 Model Metrics
              \`\`\`json
              ${metricsStr}
              \`\`\`
              
              MLflow Tracking URI: ${mlflowUri}
              
              🔗 [View on DagsHub](https://dagshub.com/sharjeel-ahmed17/spark-traffic-mlops)
              📈 [MLflow Tracking](https://dagshub.com/sharjeel-ahmed17/spark-traffic-mlops.mlflow/)`;
              
              github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: comment
              });
            } catch (e) {
              console.log('Could not post commit comment:', e.message);
            }
