name: DVC Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
      - 'dvc.lock'
      - '.github/workflows/dvc-pipeline.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'params.yaml'
      - 'dvc.yaml'
      - 'dvc.lock'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dvc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Configure DVC remote
        run: |
          # Configure your DVC remote storage
          # Example: dvc remote add -d myremote s3://my-bucket/dvc-storage
          # dvc remote modify myremote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          # dvc remote modify myremote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          echo "Configure DVC remote as needed"

      - name: Cache DVC files
        uses: actions/cache@v3
        with:
          path: |
            .dvc/cache
            data/
            models/
          key: dvc-cache-${{ hashFiles('dvc.lock') }}
          restore-keys: |
            dvc-cache-

      - name: Run DVC pipeline
        run: |
          dvc repro --force

      - name: Generate DVC plots
        if: always()
        run: |
          dvc plots diff --out plots.html || true
          mkdir -p artifacts
          mv plots.html artifacts/ || true

      - name: Collect metrics
        if: always()
        run: |
          dvc metrics show -a --json > artifacts/metrics.json || true
          cat artifacts/metrics.json

      - name: Upload DVC artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dvc-artifacts
          path: artifacts/
          retention-days: 30

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const metrics = JSON.parse(fs.readFileSync('artifacts/metrics.json', 'utf8'));
              const comment = `## DVC Pipeline Report
              
              ### Metrics
              \`\`\`json
              ${JSON.stringify(metrics, null, 2)}
              \`\`\`
              
              ✅ Pipeline completed successfully!`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post metrics comment:', e.message);
            }

      - name: Push updated dvc.lock
        if: github.event_name == 'push' && success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dvc.lock
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update dvc.lock" && git push)
        continue-on-error: true

  dvc-dag:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install DVC
        run: pip install dvc

      - name: Generate DVC DAG
        run: |
          mkdir -p dag_output
          dvc dag --md > dag_output/pipeline_dag.md

      - name: Upload DAG
        uses: actions/upload-artifact@v3
        with:
          name: dvc-dag
          path: dag_output/

      - name: Comment DAG on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const dag = fs.readFileSync('dag_output/pipeline_dag.md', 'utf8');
              const comment = `## DVC Pipeline DAG
              
              ${dag}`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post DAG comment:', e.message);
            }
